apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ff-dashboard.fullname" . }}-read-database-test"
  labels:
    {{- include "ff-dashboard.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "ff-dashboard.fullname" . }}-backend:{{ .Values.backend.service.port }}/api/notes']
  restartPolicy: Never
