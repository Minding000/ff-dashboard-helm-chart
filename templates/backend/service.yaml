apiVersion: v1
kind: Service
metadata:
  name: {{ include "ff-dashboard.fullname" . }}-backend
  labels:
    {{- include "ff-dashboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ff-dashboard.backend.selectorLabels" . | nindent 4 }}
